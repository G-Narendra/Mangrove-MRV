name: Human Like Daily Activity

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Runs every hour
    - cron: "0 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure Git
        run: |
          git config user.name "G-Narendra"
          git config user.email "narendragandikota2540@gmail.com"

      - name: Run human-like activity logic
        run: |
          python scripts/update_log.py

      - name: Commit and Push Changes
        run: |
          git add logs/daily-log.md logs/activity-state.json

          if [[ -n $(git status --porcelain) ]]; then
            COMMIT_MSG=$(python scripts/commit_message.py)

            git commit -m "$COMMIT_MSG"
            git push origin main

            echo "Changes pushed successfully"
          else
            echo "No activity generated this run"
          fi
